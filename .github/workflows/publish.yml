name: Publish packages to the Maven Central Repository

on:
  push:
    tags:
      - '*'
jobs:
  publish-dmn-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Maven Central Repository
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - id: install-secret-key
        name: Install gpg secret key
        run: |
          cat <(echo -e "$GPG_SECRET_KEY") | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG
        env:
          GPG_SECRET_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}

      - name: Publish package
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout --no-transfer-progress)
          if curl -fs "https://repo1.maven.org/maven2/de/redsix/dmn-check/${VERSION}/dmn-check-${VERSION}.pom" > /dev/null; then
            echo "::notice::Version ${VERSION} already published on Maven Central, skipping."
            exit 0
          fi
          mvn clean deploy \
            --batch-mode \
            --update-snapshots \
            --activate-profiles release \
            -Dgpg.passphrase="${GPG_SECRET_KEY_PASSWORD}"
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          GPG_SECRET_KEY_PASSWORD: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}

  publish-gradle-plugin:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Maven artifacts to local repository
        run: mvn install --batch-mode --no-transfer-progress -DskipTests

      - name: Publish package
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout --no-transfer-progress)
          if curl -fs "https://repo1.maven.org/maven2/de/redsix/dmn-check-gradle-plugin/${VERSION}/dmn-check-gradle-plugin-${VERSION}.pom" > /dev/null; then
            echo "::notice::Version ${VERSION} of gradle-plugin already published on Maven Central, skipping."
            exit 0
          fi
          cd gradle-plugin && ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_NEW }}
